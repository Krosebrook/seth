<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000'/><circle cx='50' cy='50' r='35' fill='%2300ffff'/><circle cx='50' cy='50' r='25' fill='%23000'/><path d='M40 45 L48 53 L62 39' stroke='%2300ffff' stroke-width='3' fill='none' stroke-linecap='round'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="AI-powered prompt engineering audit and multi-stakeholder simulation platform" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tessa" />
    <link rel="manifest" href="/manifest.json" />
    <title>Tessa</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }

      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        window.tessaInstallPrompt = deferredPrompt;
        window.dispatchEvent(new CustomEvent('installprompt-ready'));
      });

      window.addEventListener('appinstalled', () => {
        console.log('Tessa was installed');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
